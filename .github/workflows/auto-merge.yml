name: Auto Merge, Build, and Deploy

on:
  push:
    branches-ignore:
      - main

jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge branch into main
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git checkout main
          git merge origin/${{ github.ref_name }} --no-ff -m "Automated CI merge from branch: ${{ github.ref_name }}"
          git push origin main

  build-docker-image:
    needs: merge-branch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # This converts your repository owner name to clean lowercase letters safely
        repo_owner: [ "${{ github.repository_owner }}" ]
    steps:
      - name: Checkout updated main code
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ matrix.repo_owner }}/testing-pipe-web:latest

  deploy-local:
    needs: build-docker-image
    runs-on: self-hosted
    strategy:
      matrix:
        repo_owner: [ "${{ github.repository_owner }}" ]
    steps:
      - name: Update Application Container
        run: |
          docker rm -f pipeline-web-live || true
          docker pull ghcr.io/${{ matrix.repo_owner }}/testing-pipe-web:latest
          docker run -d -p 8080:80 --name pipeline-web-live ghcr.io/decoymaster/testing-pipe-web:latest
          
          docker image prune -f
