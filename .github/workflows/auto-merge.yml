name: Auto Merge and Docker Build

on:
  push:
    branches-ignore:
      - main

jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git checkout main
          git merge origin/${{ github.ref_name }} --no-ff -m "Automated CI merge from branch: ${{ github.ref_name }}"
          git push origin main

  # UPDATED JOB: Build and Publish the Docker Image
  build-docker-image:
    needs: merge-branch # Only run this AFTER the merge job passes successfully
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updated main code
        uses: actions/checkout@v4
        with:
          ref: main # Build the image from the newly updated main branch

      # 1. Log into GitHub's container registry so the runner has permission to upload files
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Built-in security token, no setup required

      # 2. Build and push the image using official, optimized GitHub actions
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Converts repository name to lowercase automatically to prevent registry errors
          tags: ghcr.io/${{ github.repository_owner }}/testing-pipe-web:latest
