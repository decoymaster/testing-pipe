name: Auto Merge and Docker Build

on:
  push:
    branches-ignore:
      - main

jobs:
  merge-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git checkout main
          git merge origin/${{ github.ref_name }} --no-ff -m "Automated CI merge from branch: ${{ github.ref_name }}"
          git push origin main

  # NEW JOB: Build the Docker Image
  build-docker-image:
    needs: merge-branch # Only run this AFTER the merge job passes successfully
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updated main code
        uses: actions/checkout@v4
        with:
          ref: main # Build the image from the newly updated main branch

      # This runs standard docker commands inside the GitHub cloud server to verify your Dockerfile works
      - name: Build Docker Image
        run: |
          docker build -t testing-pipe-web:latest .
